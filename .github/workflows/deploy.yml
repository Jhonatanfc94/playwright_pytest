name: "Regression and Performance Testing"

on:
  push:
    branches: ["main"]

jobs:
  # JOB 3: Pruebas de rendimiento con Locust (Docker Compose — escalable)
  performance_testing_docker:
    if: true  # Habilitar cuando se configure Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Pull code
        uses: actions/checkout@v4

      - name: Run Locust performance test with Docker Compose
        run: |
          export UID_GID=$(id -u):$(id -g)
          docker compose up \
            --build \
            --scale worker=3 \
            --abort-on-container-exit \
            --exit-code-from master

      - name: Upload Locust results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-docker-report
          path: |
            locust-report.html
            locust-results*