name: "Regression and Performance Testing"

on:
  push:
    branches: ["main"]

jobs:
  # JOB 1: Pruebas funcionales con Playwright y Pytest
  functional_testing:
    runs-on: ubuntu-latest
    steps:
      - name: Pull code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4  
        with:  
          python-version: '3.12'
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install system dependencies
        run: sudo apt-get update

      - name: Install Node.js packages (including Lighthouse)
        run: npm install && npm install -g allure-commandline

      - name: Install Python dependencies
        run: pip install -r packages.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run functional tests
        run: pytest
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          HEADLESS: "true"

      - name: Run Lighthouse performance tests
        run: pytest tests/performance/test_lighthouse.py --only-lighthouse
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          HEADLESS: "true"

      - name: Generate Allure report  
        run: allure generate allure-results -o allure-report --clean
        if: always()

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: screenshots/

  # JOB 2: Pruebas de rendimiento con Locust (Docker Compose — escalable)
  performance_testing_docker:
    if: true  # Habilitar cuando se configure Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Pull code
        uses: actions/checkout@v4

      - name: Run Locust performance test with Docker Compose
        env:
          LOCUST_HOST: ${{ secrets.BASE_URL }}
        run: |
          export UID_GID=$(id -u):$(id -g)
          docker compose up \
            --build \
            --scale worker=3 \
            --abort-on-container-exit \
            --exit-code-from master

      - name: Upload Locust results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-docker-report
          path: |
            locust-report.html
            locust-results*